<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f7f2;
        }

        .header {
            background: #556b2f;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .card {
            margin-top: 20px;
            border: none;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        }

        .btn-save {
            background: #556b2f;
            color: white;
        }

        .btn-save:hover {
            background: #3f5222;
            color: white;
        }

        .table th {
            background: #556b2f;
            color: white;
        }
    </style>
</head>

<body>

    <div class="header">
        Booking Form
    </div>

    <div class="container">
        <div class="card p-4">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label>Booking Type</label>
                    <select id="bookingType" class="form-control">
                        <option value="Sale Order">Sale Order</option>
                        <option value="Contract">Contract</option>
                        <option value="GRN">GRN</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label>PO Number</label>
                    <input type="text" id="poNumber" class="form-control">
                </div>
                <div class="col-md-4 mb-3 d-flex align-items-end">
                    <button class="btn btn-primary" onclick="fetchPO()">
                        Get Details
                    </button>
                </div>
                <div class="col-md-4 mb-3">
                    <label>SAP</label>
                    <input type="text" id="sap" class="form-control" readonly>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Customer Name</label>
                    <input type="text" id="customerName" class="form-control" readonly>
                </div>
                <div class="col-md-4 mb-3">
                    <label>City</label>
                    <input type="text" id="city" class="form-control" readonly>
                </div>
                <div class="col-md-4 mb-3">
                    <label>Booking Date</label>
                    <input type="date" id="bookingDate" class="form-control">
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h5>SKU Booking Details</h5>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>SKU Code</th>
                        <th>SKU Name</th>
                        <th>PO Qty</th>
                        <th>Booked Qty</th>
                        <th>Available Qty</th>
                        <th>Booking Qty</th>
                    </tr>
                </thead>
                <tbody id="skuTable"></tbody>
            </table>
            <button class="btn btn-save" onclick="saveBooking()">
                Save Booking
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyOAbifiTMrW_XMSb4XABGKvQiSklir27UCkMTptpFd4cfw38o8EDzcY08_gxYg5o8/exec";
        let currentPO = [];

        async function fetchPO() {
            const poNumber = document.getElementById("poNumber").value;
            const bookingType = document.getElementById("bookingType").value;

            if (bookingType === "GRN") {
                document.getElementById("sap").removeAttribute("readonly");
                document.getElementById("customerName").removeAttribute("readonly");
                document.getElementById("city").removeAttribute("readonly");

                const response = await fetch(API_URL + "?action=getSKUs");
                const skus = await response.json();

                let html = "";
                skus.forEach(item => {
                    if (!item.skuCode) return;
                    html += `
                    <tr>
                        <td>${item.skuCode}</td>
                        <td>${item.skuName}</td>
                        <td>-</td>
                        <td>-</td>
                        <td>-</td>
                        <td>
                            <input type="number" class="form-control bookingQty" data-code="${item.skuCode}" data-name="${item.skuName}" data-available="999999">
                        </td>
                    </tr>`;
                });
                document.getElementById("skuTable").innerHTML = html;
                return;
            }

            const response = await fetch(API_URL + "?action=getPO&poNumber=" + encodeURIComponent(poNumber));
            currentPO = await response.json();

            if (currentPO.length === 0) {
                alert("PO Number Not Found");
                return;
            }

            document.getElementById("sap").value = currentPO[0].sap;
            document.getElementById("customerName").value = currentPO[0].customerName;
            document.getElementById("city").value = currentPO[0].city;

            let html = "";
            currentPO.forEach(item => {
                html += `
                <tr>
                    <td>${item.skuCode}</td>
                    <td>${item.skuName}</td>
                    <td>${item.poQty}</td>
                    <td>${item.bookedQty}</td>
                    <td>${item.availableQty}</td>
                    <td>
                        <input type="number" class="form-control bookingQty" data-code="${item.skuCode}" data-name="${item.skuName}" data-available="${item.availableQty}">
                    </td>
                </tr>`;
            });
            document.getElementById("skuTable").innerHTML = html;
        }

        async function saveBooking() {
            const bookingType = document.getElementById("bookingType").value;
            const items = [];
            let valid = true;

            document.querySelectorAll(".bookingQty").forEach(row => {
                const qty = Number(row.value || 0);
                const available = Number(row.dataset.available);

                if (qty > 0) {
                    if (bookingType !== "GRN" && qty > available) {
                        alert(row.dataset.name + " Qty Not Available");
                        valid = false;
                        return;
                    }
                    items.push({
                        skuCode: row.dataset.code,
                        skuName: row.dataset.name,
                        qty: qty
                    });
                }
            });

            if (!valid) return;

            const payload = {
                action: "saveBooking",
                bookingType: bookingType,
                poNumber: document.getElementById("poNumber").value,
                sap: document.getElementById("sap").value,
                customerName: document.getElementById("customerName").value,
                city: document.getElementById("city").value,
                bookingDate: document.getElementById("bookingDate").value,
                items: items
            };

            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            alert(result.message);
        }
    </script>
</body>

</html>
