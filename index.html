<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MFS Booking Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7f2;
            min-height: 100vh;
        }

        .header {
            background: #556b2f;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            gap: 40px;
        }

        .portal-card {
            width: 320px;
            height: 220px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.15);
        }

        .portal-card:hover {
            transform: translateY(-8px);
        }

        .po-card {
            background: #6b8e23;
            color: white;
        }

        .booking-card {
            background: #3f704d;
            color: white;
        }

        .card-body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        .card-title {
            font-size: 28px;
            font-weight: bold;
        }

        .card-text {
            margin-top: 10px;
            text-align: center;
        }
    </style>

</head>

<body>

    <div class="header">
        MFS Booking Portal
    </div>

    <div class="main-container">

        <div class="card portal-card po-card" onclick="location.href='po_booking.html'">

            <div class="card-body">

                <h3 class="card-title">
                    PO Booking
                </h3>

                <p class="card-text">
                    Create and manage PO bookings
                </p>

            </div>

        </div>

        <div class="card portal-card booking-card" onclick="location.href='booking.html'">

            <div class="card-body">

                <h3 class="card-title">
                    Booking Form
                </h3>

                <p class="card-text">
                    Create Sale Order / GRN Booking
                </p>

            </div>

        </div>

    </div>

</body>

</html>
